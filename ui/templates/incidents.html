<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Incident List</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
    <div class="container mt-4">
        <h1>Incident List</h1>
        <table class="table table-striped">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>User</th>
                    <th>Severity</th>
                    <th>Risk</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                {% for incident in incidents %}
                <tr onclick="window.location='/incidents/{{ incident.incident_id }}'" style="cursor:pointer;">
                    <td>{{ incident.incident_id }}</td>
                    <td>{{ incident.user }}</td>
                    <td>{{ incident.severity }}</td>
                    <td>{{ incident.risk_score }}</td>
                    <td>{{ incident.status }}</td>
                    <td><a href="/incidents/{{ incident.incident_id }}" class="btn btn-sm btn-outline-info">View</a></td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        <a href="/dashboard" class="btn btn-outline-primary">Back to Dashboard</a>
    </div>
</body>
</html>
